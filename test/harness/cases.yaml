      entity_id: user-14
      context:
        env: prod
    - flag_key: flag_missing
      entity_id: user-15
      context: {}
  expected:
    responses:
      - type: VARIANT_EVALUATION_RESPONSE_TYPE
        booleanResponse: null
        variantResponse:
          match: true
          segmentKeys:
            - seg_string_eq
          reason: MATCH_EVALUATION_REASON
          flagKey: flag_variant_string_eq
          variantKey: on
          variantAttachment: null
        errorResponse: null
      - type: BOOLEAN_EVALUATION_RESPONSE_TYPE
        booleanResponse:
          enabled: true
          flagKey: flag_boolean_segment
          reason: MATCH_EVALUATION_REASON
          segmentKeys:
            - seg_string_eq
        variantResponse: null
        errorResponse: null
      - type: ERROR_EVALUATION_RESPONSE_TYPE
        booleanResponse: null
        variantResponse: null
        errorResponse:
          flagKey: flag_missing
          namespaceKey: venus
          reason: NOT_FOUND_ERROR_EVALUATION_REASON
